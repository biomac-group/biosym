stages:
  - testing
  - deploy
  - pages

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"

.python_base: &python_base
  tags:
    - old_workstation
  image: python:3.13
  before_script:
    - apt-get update && apt-get install -y pkg-config build-essential gfortran libblas-dev liblapack-dev coinor-libipopt-dev
    - git config --global credential.helper store
    - echo "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitos.rrze.fau.de" > ~/.git-credentials
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    # add uv to PATH
    - export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
    # make sure shell reloads environment properly (optional alternative)
    # - source $HOME/.local/bin/env
    - uv sync
    - uv pip install poethepoet

test:
  stage: testing
  <<: *python_base
  script:
    - uv run poe test

lint:
  stage: testing
  <<: *python_base
  script:
    - uv run poe lint || true  # Don't fail on linting errors for now
    - uv run poe format_check || true  # Don't fail on formatting errors for now


docs:
  stage: deploy
  <<: *python_base
  script:
    - uv run poe docs || true # Don't fail on docs errors for now
  #  - cp -r docs/_build/html ./html_docs
  artifacts:
    paths:
      - html_docs
    expire_in: 2 month

 
pages:
  stage: pages
  image: alpine:latest  # Lightweight image for file operations
  dependencies:
    - docs
  needs:
    - docs
  tags:
    - old_workstation
  script:
    - mkdir .public
  #- cp -r html_docs/* .public
  #- mv .public public
  artifacts:
    paths:
      - public
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
