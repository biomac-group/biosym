collocation:
  name: script2d_torque_driven
  description: Setup file for 2D gait model with torque-driven actuators
  settings:
    model: tests/models/gait2d_torque/gait2d_torque.yaml
    nnodes: 100
    discretization:
      type: euler
      args:
        mode: backward # default: backward
        vars: q # FK or q, default: q
        weight: 10 # Standard weight for the discretization
        adaptive_h: false
    output:
      file: "~/.biosym/walking2d.pkl"
    tol: 1e-2
    max_iter: 1000
    dtype: float32 # float64 still makes problems

  objectives:
    - name: torque_term
      weight: 1e-2
      args:
        exponent: 3
    - name: jerk_term
      weight: 1e-2
    - name: track_angles
      weight: 1
      args:
        file: "~/.biosym/Data/Subject_01/gait_avg_joint_angles.csv"
    - name: track_grfs
      weight: 1
      args:
        file: "~/.biosym/Data/Subject_01/gait_avg_grfs.csv"


  constraints:
    - name: dynamics
      weight: "1/BW"
    - name: ground_contact
      weight: "1/BW"
    - name: actuators
      weight: 1
    - name: periodicity
      weight: 1
      args:
        symmetry: false
        exclude: [0] # Exclude the first dimension --> pelvis_tx # Todo - that should be cross-check with the speed idx

  initial_guess:
    type: from_file
    file: "~/.biosym/standing2d.pkl"

  bounds:
    from_model: true
    start_at_origin: true
    dur: [0.5, 1.5]
    speed: 1.3


  
    
