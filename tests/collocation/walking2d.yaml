collocation:
  name: script2d_torque_driven
  description: Setup file for 2D gait model with torque-driven actuators
  settings:
    model: tests/models/gait2d/gait2d.yaml
    nnodes: 50
    discretization:
      type: euler
      args:
        mode: backward # default: backward
        vars: q # FK or q, default: q
        weight: 10 # Standard weight for the discretization
        adaptive_h: false
    output:
      file: "~/.biosym/walking2d.pkl"
    tol: 5e-4
    acceptable_dual_inf_tol: 1e-3
    acceptable_tol: 1e-3
    constr_viol_tol: 1e-4
    max_iter: 6000

  objectives:
    - name: effort_term
      weight: 1e5
      args:
        exponent: 3

  constraints:
    - name: dynamics
      weight: 1
    - name: ground_contact
      weight: "1/BW"
    - name: actuators
      weight: "1/BW"
    - name: periodicity
      weight: 1
      args:
        symmetry: true
        exclude: [0] # Exclude the first dimension --> pelvis_tx # Todo - that should be cross-check with the speed idx

  initial_guess:
    type: from_file
    file: "~/.biosym/standing2d.pkl"

  bounds:
    from_model: true
    start_at_origin: true
    dur: [0.4,0.7]
    speed: 1.3


  
    
